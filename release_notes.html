<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Timepick Saver Release Notes</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.5;
        padding: 30px;
        max-width: 500px;
        margin: 0 auto;
        color: #333;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 36px;
      }
      h2 {
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
        margin-bottom: 10px;
      }
      .release-item {
        margin-bottom: 25px;
      }
      .version-title {
        font-weight: bold;
        font-size: 1.1em;
        display: block;
        margin-bottom: 5px;
      }
      ul {
        padding-left: 20px;
        margin: 0;
      }
      li {
        margin-bottom: 5px;
        font-size: 0.95em;
      }
      .footer {
        margin-top: 40px;
        font-size: 0.8em;
        color: #888;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="logo.png" alt="logo" height="40" />
    </div>

    <h2>업데이트 내역</h2>

    <div class="release-item">
      <span class="version-title">v1.1</span>
      <ul>
        <li>
          자동 채우기 구현 방식 변경 (블럭 클릭 방식 -> 드래그 시뮬레이션)
        </li>
        <li>자동 채우기 후 시간표 반영 안 되던 버그 수정</li>
        <li>업데이트 안내 페이지 추가</li>
      </ul>
    </div>

    <div class="release-item">
      <span class="version-title">v1.0</span>
      <ul>
        <li>최초 버전</li>
      </ul>
    </div>

    <div class="footer">Timepick Saver</div>
  </body>
</html>
